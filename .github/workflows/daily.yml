name: note 自動投稿（朝9時・夜17時）

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = JST 09:00
    - cron: "0 8 * * *"   # UTC 08:00 = JST 17:00
  workflow_dispatch:        # 手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r note-auto/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run pipeline
        working-directory: note-auto
        env:
          NOTE_COOKIE: ${{ secrets.NOTE_COOKIE }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_MAGAZINE_ID: ${{ secrets.NOTE_MAGAZINE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python main.py --count 1
